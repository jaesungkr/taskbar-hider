name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Test import
        run: python -c "from slink.core import SlinkCore; print('import OK')"

      - name: Build exe
        run: |
          pyinstaller --onefile --windowed --name Slink --icon=slink.ico --add-data "slink.ico;." --add-data "slink.png;." --noconfirm main.py 2>&1

      - name: List dist
        if: always()
        run: |
          dir dist 2>$null
          dir build 2>$null

      - name: Upload exe to Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Slink.exe
