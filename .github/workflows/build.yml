name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          python -m PyInstaller --onefile --windowed --name Slink --icon=slink.ico --add-data "slink.ico;." --add-data "slink.png;." --add-data "ui.html;." --hidden-import comtypes --hidden-import comtypes.stream --hidden-import comtypes.client --hidden-import pystray --hidden-import pystray._win32 --hidden-import PIL --hidden-import PIL.Image --hidden-import PIL.ImageDraw --hidden-import webview --hidden-import webview.platforms.edgechromium --hidden-import webview.platforms.winforms --hidden-import clr_loader --hidden-import clr --hidden-import pythonnet --hidden-import bottle --hidden-import slink --hidden-import slink.core --hidden-import slink.gui --hidden-import slink.win32 --hidden-import slink.tray --hidden-import slink.updater --hidden-import slink.resources --noconfirm main.py

      - name: Upload exe to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Slink.exe
          generate_release_notes: true
