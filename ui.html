<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slink</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #171717;
  --surface: #1e1e1e;
  --surface-2: #252525;
  --surface-3: #2a2a2a;
  --border: #2e2e2e;
  --border-light: #333;
  --fg: #e8e8e6;
  --fg-2: #999;
  --fg-3: #666;
  --accent: #e8e8e6;
  --accent-dim: rgba(232,232,230,0.08);
  --danger: #e05555;
  --success: #4ade80;
  --radius: 10px;
  --radius-sm: 6px;
  --font: 'Segoe UI', 'Malgun Gothic', -apple-system, sans-serif;
  --mono: 'Cascadia Code', 'Consolas', 'Malgun Gothic', monospace;
  --transition: 150ms cubic-bezier(0.4, 0, 0.2, 1);
}

html, body {
  width: 100%; height: 100%;
  font-family: var(--font);
  font-size: 13px;
  color: var(--fg);
  background: var(--bg);
  overflow: hidden;
  user-select: none;
  -webkit-font-smoothing: antialiased;
}

/* ── Light Theme ──────────────────────────── */
body.light {
  --bg: #f5f5f3;
  --surface: #ffffff;
  --surface-2: #f0efed;
  --surface-3: #e8e7e5;
  --border: #e0dfdd;
  --border-light: #d4d3d1;
  --fg: #1a1a1a;
  --fg-2: #555;
  --fg-3: #999;
  --accent: #1a1a1a;
  --accent-dim: rgba(26,26,26,0.05);
  --danger: #d45555;
  --success: #2d7a4a;
}

/* ── Title Bar ───────────────────────────── */
.titlebar {
  height: 38px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  background: var(--bg);
  flex-shrink: 0;
}

.titlebar-drag {
  flex: 1;
  height: 100%;
  display: flex;
  align-items: center;
  -webkit-app-region: drag;
}

.titlebar-logo {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--fg);
}

.titlebar-version {
  font-size: 10px;
  color: var(--fg-3);
  margin-left: 6px;
  font-family: var(--mono);
}

.titlebar-controls {
  display: flex;
  gap: 2px;
  -webkit-app-region: no-drag;
}

.titlebar-btn {
  width: 32px; height: 26px;
  border: none; background: transparent;
  color: var(--fg-3);
  font-size: 14px;
  cursor: pointer;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.titlebar-btn:hover { background: var(--surface-2); color: var(--fg); }
.titlebar-btn.close:hover { background: var(--danger); color: #fff; }

/* ── Layout ───────────────────────────────── */
.app {
  display: flex;
  flex-direction: column;
  height: calc(100vh - 38px);
  padding: 0 16px 16px;
}

/* ── Nav ──────────────────────────────────── */
.nav {
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 4px 0 14px;
  flex-shrink: 0;
}

.nav-tab {
  padding: 6px 16px;
  border: none;
  background: transparent;
  color: var(--fg-3);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 6px;
  transition: all var(--transition);
  letter-spacing: 0.2px;
}
.nav-tab:hover { color: var(--fg-2); background: var(--accent-dim); }
.nav-tab.active { color: var(--fg); background: var(--surface-2); }

.nav-spacer { flex: 1; }

.nav-quit {
  padding: 5px 12px;
  border: none;
  background: transparent;
  color: var(--fg-3);
  font-family: var(--font);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  border-radius: 6px;
  transition: all var(--transition);
}
.nav-quit:hover { color: var(--danger); background: rgba(224,85,85,0.1); }

/* ── Page ─────────────────────────────────── */
.page { display: none; flex-direction: column; flex: 1; min-height: 0; }
.page.active { display: flex; }

/* ── Action Bar ───────────────────────────── */
.action-bar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding-bottom: 12px;
  flex-shrink: 0;
}

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--fg);
  font-family: var(--font);
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border-radius: var(--radius-sm);
  transition: all var(--transition);
}
.btn:hover { background: var(--surface-2); border-color: var(--border-light); }
.btn:active { transform: scale(0.97); }

.btn-primary { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.btn-primary:hover { background: var(--fg-2); border-color: var(--fg-2); }

.btn-icon {
  width: 30px; height: 30px;
  padding: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px;
}

.status { margin-left: auto; font-size: 11px; color: var(--fg-3); font-family: var(--mono); }

/* ── Search ───────────────────────────────── */
.search-wrap {
  position: relative;
  flex: 1;
  max-width: 200px;
  margin-left: 8px;
}

.search-input {
  width: 100%;
  height: 30px;
  padding: 0 10px 0 28px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--fg);
  font-family: var(--font);
  font-size: 11px;
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color var(--transition);
}
.search-input::placeholder { color: var(--fg-3); }
.search-input:focus { border-color: var(--border-light); }

.search-icon {
  position: absolute;
  left: 9px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--fg-3);
  font-size: 12px;
  pointer-events: none;
}

.search-clear {
  position: absolute;
  right: 6px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--fg-3);
  font-size: 14px;
  cursor: pointer;
  padding: 0 2px;
  display: none;
  line-height: 1;
}
.search-clear:hover { color: var(--fg); }

/* ── Section ──────────────────────────────── */
.section { display: flex; flex-direction: column; min-height: 0; flex: 1; }
.section + .section { margin-top: 12px; }

.section-header { display: flex; align-items: center; padding: 0 2px 6px; }
.section-label { font-size: 10px; font-weight: 600; color: var(--fg-3); letter-spacing: 1.2px; text-transform: uppercase; }
.section-count { margin-left: auto; font-size: 10px; color: var(--fg-3); font-family: var(--mono); }

/* ── List Card ────────────────────────────── */
.list-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  flex: 1; min-height: 0;
  overflow-y: auto; overflow-x: hidden;
}

.list-card::-webkit-scrollbar { width: 6px; }
.list-card::-webkit-scrollbar-track { background: transparent; }
.list-card::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

/* ── Row ──────────────────────────────────── */
.row {
  display: flex; align-items: center;
  height: 36px; padding: 0 12px;
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
}
.row:hover { background: var(--accent-dim); }
.row.selected { background: var(--accent-dim); }
.row.selected::before {
  content: '';
  position: absolute;
  left: 0; top: 8px; bottom: 8px;
  width: 3px;
  background: var(--fg);
  border-radius: 0 2px 2px 0;
}

.row + .row { border-top: 1px solid var(--border); }

.row-process {
  width: 110px; flex-shrink: 0;
  font-size: 11px; color: var(--fg-3);
  font-family: var(--mono);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.row-title {
  flex: 1; font-size: 12px; color: var(--fg-2);
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding-left: 12px;
}

.row.selected .row-title { color: var(--fg); }

.list-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--fg-3); font-size: 12px; font-style: italic;
}

/* ── Settings ─────────────────────────────── */
.settings-scroll { flex: 1; overflow-y: auto; padding-right: 4px; }
.settings-scroll::-webkit-scrollbar { width: 6px; }
.settings-scroll::-webkit-scrollbar-track { background: transparent; }
.settings-scroll::-webkit-scrollbar-thumb { background: var(--border-light); border-radius: 3px; }

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
}
.card + .card { margin-top: 8px; }

.card-title { font-size: 11px; font-weight: 600; color: var(--fg); letter-spacing: 0.3px; margin-bottom: 10px; }

.info-row { display: flex; padding: 3px 0; }
.info-label { width: 64px; font-size: 11px; color: var(--fg-3); flex-shrink: 0; }
.info-value { font-size: 11px; color: var(--fg-2); }

.update-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

.btn-sm {
  padding: 5px 12px; font-size: 11px;
  border: 1px solid var(--border); background: var(--surface-2);
  color: var(--fg-2); font-family: var(--font); font-weight: 500;
  cursor: pointer; border-radius: var(--radius-sm);
  transition: all var(--transition);
}
.btn-sm:hover { border-color: var(--border-light); color: var(--fg); }
.btn-sm:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-sm.primary { background: var(--fg); color: var(--bg); border-color: var(--fg); }
.btn-sm.primary:hover { background: var(--fg-2); }

.update-status { font-size: 11px; color: var(--fg-3); font-family: var(--mono); }
.update-status.available { color: var(--danger); }
.update-status.ok { color: var(--success); }

.link-btn {
  background: none; border: none; color: var(--fg-3);
  font-family: var(--font); font-size: 11px; cursor: pointer;
  padding: 4px 0; transition: color var(--transition);
}
.link-btn:hover { color: var(--fg); }

/* ── Theme Toggle ─────────────────────────── */
.theme-toggle {
  display: inline-flex;
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.theme-opt {
  padding: 5px 14px;
  font-size: 11px;
  font-family: var(--font);
  font-weight: 500;
  color: var(--fg-3);
  background: transparent;
  border: none;
  cursor: pointer;
  transition: all var(--transition);
}
.theme-opt:hover { color: var(--fg-2); }
.theme-opt.active {
  background: var(--fg);
  color: var(--bg);
}

/* ── Animations ───────────────────────────── */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.row { animation: fadeIn 200ms ease both; }
.row:nth-child(1) { animation-delay: 0ms; }
.row:nth-child(2) { animation-delay: 20ms; }
.row:nth-child(3) { animation-delay: 40ms; }
.row:nth-child(4) { animation-delay: 60ms; }
.row:nth-child(5) { animation-delay: 80ms; }
.row:nth-child(6) { animation-delay: 100ms; }
.row:nth-child(7) { animation-delay: 120ms; }
.row:nth-child(8) { animation-delay: 140ms; }
.row:nth-child(9) { animation-delay: 160ms; }
.row:nth-child(10) { animation-delay: 180ms; }

.card { animation: fadeIn 250ms ease both; }

/* ── Toast ────────────────────────────────── */
.toast {
  position: fixed; bottom: 20px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--surface-3);
  border: 1px solid var(--border-light);
  color: var(--fg); font-size: 12px;
  padding: 8px 18px; border-radius: 8px;
  opacity: 0; transition: all 300ms cubic-bezier(0.4, 0, 0.2, 1);
  pointer-events: none; z-index: 200;
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="titlebar">
  <div class="titlebar-drag pywebview-drag-region">
    <span class="titlebar-logo">Slink</span>
    <span class="titlebar-version" id="version"></span>
  </div>
  <div class="titlebar-controls">
    <button class="titlebar-btn" onclick="api('/api/minimize')" title="Minimize">─</button>
    <button class="titlebar-btn close" onclick="api('/api/hide')" title="Close to tray">✕</button>
  </div>
</div>

<div class="app">
  <nav class="nav">
    <button class="nav-tab active" data-tab="windows" onclick="switchTab('windows')">Windows</button>
    <button class="nav-tab" data-tab="settings" onclick="switchTab('settings')">Settings</button>
    <div class="nav-spacer"></div>
    <button class="nav-quit" onclick="api('/api/quit')">Quit</button>
  </nav>

  <div class="page active" id="page-windows">
    <div class="action-bar">
      <button class="btn btn-primary" onclick="hideSelected()"><span>↓</span> Hide</button>
      <button class="btn" onclick="showSelected()"><span>↑</span> Show</button>
      <button class="btn btn-icon" onclick="refreshList()" title="Refresh">↻</button>
      <div class="search-wrap">
        <span class="search-icon">⌕</span>
        <input class="search-input" id="search" type="text" placeholder="Search..." oninput="onSearch()" />
        <button class="search-clear" id="search-clear" onclick="clearSearch()">×</button>
      </div>
      <span class="status" id="status"></span>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-label">Visible</span>
        <span class="section-count" id="vis-count">0</span>
      </div>
      <div class="list-card" id="visible-list"></div>
    </div>

    <div class="section">
      <div class="section-header">
        <span class="section-label">Hidden</span>
        <span class="section-count" id="hid-count">0</span>
      </div>
      <div class="list-card" id="hidden-list"></div>
    </div>
  </div>

  <div class="page" id="page-settings">
    <div class="settings-scroll">
      <div class="card">
        <div class="card-title">About</div>
        <div class="info-row"><span class="info-label">App</span><span class="info-value" id="info-app"></span></div>
        <div class="info-row"><span class="info-label">Version</span><span class="info-value" id="info-version"></span></div>
        <div class="info-row"><span class="info-label">Author</span><span class="info-value" id="info-author"></span></div>
        <div class="info-row"><span class="info-label">License</span><span class="info-value">MIT</span></div>
      </div>

      <div class="card">
        <div class="card-title">Theme</div>
        <div class="theme-toggle">
          <button class="theme-opt active" id="theme-dark" onclick="setTheme('dark')">Dark</button>
          <button class="theme-opt" id="theme-light" onclick="setTheme('light')">Light</button>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Update</div>
        <div class="update-row">
          <button class="btn-sm" id="btn-check" onclick="checkUpdate()">Check for Updates</button>
          <button class="btn-sm primary" id="btn-update" onclick="doUpdate()" style="display:none">Update Now</button>
          <span class="update-status" id="update-status"></span>
        </div>
      </div>

      <div class="card">
        <div class="card-title">Links</div>
        <button class="link-btn" onclick="api('/api/open_releases')">GitHub Releases →</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://127.0.0.1:__API_PORT__';

async function api(path, body) {
  const opts = body
    ? { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) }
    : { method: 'GET' };
  const r = await fetch(API + path, opts);
  return r.json();
}

let selectedVisible = new Set();
let selectedHidden = new Set();
let cachedVisible = [];
let cachedHidden = [];

// ── Init ──
window.addEventListener('DOMContentLoaded', async () => {
  const info = await api('/api/info');
  document.getElementById('version').textContent = 'v' + info.version;
  document.getElementById('info-app').textContent = info.name;
  document.getElementById('info-version').textContent = 'v' + info.version;
  document.getElementById('info-author').textContent = info.author;

  // 저장된 테마 로드
  const settings = await api('/api/get_theme');
  if (settings.theme) applyTheme(settings.theme);

  refreshList();
});

function applyTheme(theme) {
  if (theme === 'light') {
    document.body.classList.add('light');
  } else {
    document.body.classList.remove('light');
  }
  document.getElementById('theme-dark').classList.toggle('active', theme !== 'light');
  document.getElementById('theme-light').classList.toggle('active', theme === 'light');
}

async function setTheme(theme) {
  applyTheme(theme);
  await api('/api/set_theme/' + theme);
}

function switchTab(tab) {
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
  document.querySelectorAll('.page').forEach(p => p.classList.toggle('active', p.id === 'page-' + tab));
}

async function refreshList() {
  const data = await api('/api/windows');
  cachedVisible = data.visible || [];
  cachedHidden = data.hidden || [];
  selectedVisible.clear();
  selectedHidden.clear();
  renderFiltered();
}

function renderFiltered() {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  const vis = q ? cachedVisible.filter(w => w.process.toLowerCase().includes(q) || w.title.toLowerCase().includes(q)) : cachedVisible;
  const hid = q ? cachedHidden.filter(w => w.process.toLowerCase().includes(q) || w.title.toLowerCase().includes(q)) : cachedHidden;

  renderList('visible-list', vis, selectedVisible);
  renderList('hidden-list', hid, selectedHidden);
  document.getElementById('vis-count').textContent = q ? vis.length + '/' + cachedVisible.length : cachedVisible.length;
  document.getElementById('hid-count').textContent = q ? hid.length + '/' + cachedHidden.length : cachedHidden.length;
  document.getElementById('status').textContent = cachedVisible.length + ' visible · ' + cachedHidden.length + ' hidden';

  document.getElementById('search-clear').style.display = q ? 'block' : 'none';
}

function onSearch() { renderFiltered(); }
function clearSearch() {
  document.getElementById('search').value = '';
  renderFiltered();
  document.getElementById('search').focus();
}

function renderList(id, items, selSet) {
  const el = document.getElementById(id);
  if (!items.length) { el.innerHTML = '<div class="list-empty">No windows</div>'; return; }
  el.innerHTML = items.map((w, i) =>
    `<div class="row${selSet.has(w.hwnd) ? ' selected' : ''}" data-hwnd="${w.hwnd}" onclick="toggle(this,${w.hwnd},'${id}')"
          style="animation-delay:${Math.min(i*20,200)}ms">
      <span class="row-process">${esc(w.process)}</span>
      <span class="row-title">${esc(w.title)}</span>
    </div>`
  ).join('');
}

function toggle(el, hwnd, listId) {
  const s = listId === 'visible-list' ? selectedVisible : selectedHidden;
  if (s.has(hwnd)) { s.delete(hwnd); el.classList.remove('selected'); }
  else { s.add(hwnd); el.classList.add('selected'); }
}

async function hideSelected() {
  if (!selectedVisible.size) { showToast('Select a window to hide'); return; }
  const r = await api('/api/hide_windows', { hwnds: [...selectedVisible] });
  showToast('Hidden ' + r.hidden_count + ' window(s)');
  refreshList();
}

async function showSelected() {
  if (!selectedHidden.size) { showToast('Select a window to restore'); return; }
  const r = await api('/api/show_windows', { hwnds: [...selectedHidden] });
  showToast('Restored ' + r.shown_count + ' window(s)');
  refreshList();
}

async function checkUpdate() {
  const btn = document.getElementById('btn-check');
  const st = document.getElementById('update-status');
  btn.disabled = true;
  st.textContent = 'Checking...';
  st.className = 'update-status';
  const r = await api('/api/check_update');
  if (r.status === 'available') {
    st.textContent = 'v' + r.version + ' available';
    st.className = 'update-status available';
    document.getElementById('btn-update').style.display = '';
  } else if (r.status === 'up_to_date') {
    st.textContent = 'Up to date';
    st.className = 'update-status ok';
  } else {
    st.textContent = 'Check failed';
  }
  btn.disabled = false;
}

async function doUpdate() {
  document.getElementById('btn-update').disabled = true;
  document.getElementById('update-status').textContent = 'Downloading...';
  await api('/api/do_update');
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2000);
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
</script>
</body>
</html>
